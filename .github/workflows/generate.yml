name: Generate HTML

on:
  push:
    branches: [main]
    paths:
      - 'data/specimens.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate HTML
        run: node generate.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html case/
          git diff --cached --quiet || git commit -m "chore: regenerate HTML from specimens.json"
          git push
